<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>YouTube Player</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  #player-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }

  /* The box whose aspect ratio is set by JS depending on isShorts (9:16 vs 16:9) */
  #player-box {
    position: relative;
  }

  #player-box iframe,
  #player {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>

<div id="player-wrapper">
  <div id="player-box">
    <div id="player"></div>
  </div>
</div>

<script>
  // ---- Read params passed from Flutter ----
  var params = new URLSearchParams(window.location.search);
   var videoId = params.get('id') || params.get('videoId') || '';
  var isShorts = params.get('isShorts') === 'true' || params.get('isShorts') === '1';
  console.log('videoId:', videoId, 'isShorts:', isShorts);
  // ---- Size the player box to fit the viewport while keeping the right aspect ratio ----
  var ASPECT_W = isShorts ? 9 : 16;
  var ASPECT_H = isShorts ? 16 : 9;

  function resizePlayerBox() {
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var targetRatio = ASPECT_W / ASPECT_H;

    var boxW = vw;
    var boxH = boxW / targetRatio;

    if (boxH > vh) {
      boxH = vh;
      boxW = boxH * targetRatio;
    }

    var box = document.getElementById('player-box');
    box.style.width = boxW + 'px';
    box.style.height = boxH + 'px';
  }

  window.addEventListener('resize', resizePlayerBox);
  window.addEventListener('orientationchange', resizePlayerBox);
  resizePlayerBox();

  // ---- Load the YouTube IFrame API ----
  var tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  var firstScriptTag = document.getElementsByTagName('script')[0];
  firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

  var player;
  var isPlayerReady = false;
  var pendingCommand = null; // queues a play/pause request made before the player is ready

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      videoId: videoId,
      playerVars: {
        playsinline: 1,
        autoplay: 0,
        controls: 0,
        rel: 0,
        modestbranding: 0,
        fs: 1
      },
      events: {
        onReady: onPlayerReady
      }
    });
  }

  function onPlayerReady() {
    isPlayerReady = true;
    if (pendingCommand === 'play') {
      player.playVideo();
    } else if (pendingCommand === 'pause') {
      player.pauseVideo();
    }
    pendingCommand = null;
  }

  // ---- Methods callable from Flutter WebView, e.g. via controller.runJavascript('playVideo()') ----
  function playVideo() {
    if (isPlayerReady && player) {
      player.playVideo();
    } else {
      pendingCommand = 'play';
    }
  }

  function pauseVideo() {
    if (isPlayerReady && player) {
      player.pauseVideo();
    } else {
      pendingCommand = 'pause';
    }
  }

  // Expose globally so Flutter's WebView JS evaluation can reach them.
  window.playVideo = playVideo;
  window.pauseVideo = pauseVideo;
</script>

</body>
</html>
